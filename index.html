<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Robo Car | PDR Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide-react/0.263.1/lucide-react.min.js"></script>
    
    <!-- Firebase SDKs (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Environment Globals
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'rc-car-ace9d';
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // State variables
        let lastCommand = 'S';
        let headlightState = false;
        let currentUser = null;

        // 1. Mandatory Auth Initialization
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                addLog("Auth Error: " + error.message, "error");
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                const statusEl = document.getElementById('connection-status');
                statusEl.innerHTML = '<div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div> Authorized';
                statusEl.classList.replace('text-red-500', 'text-green-500');
                addLog('Firebase Authenticated: ' + user.uid, 'success');
                setupListeners();
            }
        });

        /**
         * FIX: Firebase paths for documents must have an EVEN number of segments.
         * Previous: artifacts/appId/public/data/control (5 segments - INVALID)
         * Corrected: artifacts/appId/public/data/control/config (6 segments - VALID)
         * Or simply: artifacts/appId/public/data (This refers to a collection, not a document)
         * RULE 1 - Strict Paths: /artifacts/{appId}/public/data/{collectionName}
         * We will use 'control' as the collection and 'state' as the document ID.
         */
        const getControlDoc = () => doc(db, 'artifacts', appId, 'public', 'data', 'control', 'state');

        const sendCommand = async (action) => {
            if (!currentUser || action === lastCommand) return;
            
            const start = Date.now();
            try {
                await setDoc(getControlDoc(), {
                    action: action,
                    headlights: headlightState,
                    updatedBy: currentUser.uid,
                    timestamp: serverTimestamp()
                });
                
                const latency = Date.now() - start;
                document.getElementById('ping-val').innerText = latency + 'ms';
                lastCommand = action;
                updateButtonStyles(action);
            } catch (err) {
                addLog('Command Failed: ' + err.message, 'error');
            }
        };

        const setupListeners = () => {
            onSnapshot(getControlDoc(), (snapshot) => {
                const data = snapshot.data();
                if (data && data.action !== lastCommand) {
                    updateButtonStyles(data.action);
                    lastCommand = data.action;
                }
            }, (err) => addLog("Sync Error: " + err.message, "error"));
        };

        // UI Helpers and Event Listeners
        const logContainer = document.getElementById('log-container');
        function addLog(message, type = 'info') {
            const entry = document.createElement('div');
            const time = new Date().toLocaleTimeString();
            entry.className = type === 'error' ? 'text-red-400' : (type === 'success' ? 'text-green-400' : 'text-slate-400');
            entry.innerHTML = `<span class="text-slate-600 text-[10px]">[${time}]</span> ${message}`;
            logContainer.prepend(entry);
        }

        function updateButtonStyles(action) {
            document.querySelectorAll('.control-btn').forEach(b => b.classList.remove('active-direction'));
            const activeBtn = document.getElementById('btn-' + action);
            if (activeBtn) activeBtn.classList.add('active-direction');
            if (action !== 'S') addLog(`Car moving: ${action}`);
        }

        // Initialize Everything
        window.onload = () => {
            initAuth();
            
            // Manual D-Pad
            document.querySelectorAll('.control-btn').forEach(btn => {
                const cmd = btn.getAttribute('data-command');
                btn.addEventListener('mousedown', () => sendCommand(cmd));
                btn.addEventListener('mouseup', () => sendCommand('S'));
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); sendCommand(cmd); });
                btn.addEventListener('touchend', () => sendCommand('S'));
            });

            // Lighting
            document.getElementById('headlight-toggle').addEventListener('click', () => {
                headlightState = !headlightState;
                const icon = document.getElementById('headlight-icon');
                if (headlightState) {
                    icon.classList.replace('text-slate-500', 'text-yellow-400');
                    addLog('Headlights ON');
                } else {
                    icon.classList.replace('text-yellow-400', 'text-slate-500');
                    addLog('Headlights OFF');
                }
                const act = lastCommand; lastCommand = null; sendCommand(act);
            });

            // E-Stop
            document.getElementById('estop-btn').addEventListener('click', () => sendCommand('S'));
        };

        // Expose functions to window for HTML onclicks
        window.switchTab = (tab) => {
            ['path', 'gesture', 'telemetry'].forEach(t => {
                document.getElementById('tab-' + t).className = t === tab 
                    ? 'flex-1 py-2 rounded-lg font-medium text-sm transition-all bg-blue-600 text-white'
                    : 'flex-1 py-2 rounded-lg font-medium text-sm transition-all text-slate-400';
                document.getElementById('content-' + t).classList.toggle('hidden', t !== tab);
            });
        };
    </script>

    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; }
        .control-btn { transition: all 0.2s; background: #1e293b; border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; }
        .active-direction { background-color: #3b82f6 !important; box-shadow: 0 0 15px #3b82f6; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <header class="max-w-6xl mx-auto mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h1 class="text-3xl font-bold text-white flex items-center gap-3">
                <span class="p-2 bg-blue-600 rounded-lg"><lucide-icon name="cpu"></lucide-icon></span>
                Mini Robo Car <span class="text-blue-500 text-sm border border-blue-500/30 px-2 py-0.5 rounded ml-2">v1.1</span>
            </h1>
            <p class="text-slate-400 mt-1">Authorized Command Center</p>
        </div>
        
        <div class="flex gap-3">
            <div id="connection-status" class="flex items-center gap-2 px-3 py-1.5 bg-slate-800 text-red-500 rounded-full border border-slate-700 text-sm font-medium">
                <div class="w-2 h-2 rounded-full bg-current animate-pulse"></div>
                Initializing...
            </div>
            <button id="estop-btn" class="bg-red-600 hover:bg-red-700 text-white px-6 py-1.5 rounded-full font-bold uppercase text-sm">E-Stop</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-4 space-y-6">
            <section class="glass-panel rounded-2xl p-6">
                <h2 class="text-lg font-semibold mb-6">Manual Control</h2>
                <div class="relative w-48 h-48 mx-auto mb-4">
                    <button id="btn-F" class="control-btn absolute top-0 left-1/2 -translate-x-1/2 w-14 h-14" data-command="F">↑</button>
                    <button id="btn-L" class="control-btn absolute top-1/2 left-0 -translate-y-1/2 w-14 h-14" data-command="L">←</button>
                    <button id="btn-S" class="control-btn absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 border-2 border-blue-500" data-command="S">■</button>
                    <button id="btn-R" class="control-btn absolute top-1/2 right-0 -translate-y-1/2 w-14 h-14" data-command="R">→</button>
                    <button id="btn-B" class="control-btn absolute bottom-0 left-1/2 -translate-x-1/2 w-14 h-14" data-command="B">↓</button>
                </div>
            </section>

            <section class="glass-panel rounded-2xl p-6">
                <h2 class="text-lg font-semibold mb-4">Lighting</h2>
                <button id="headlight-toggle" class="w-full flex items-center justify-center gap-2 p-4 bg-slate-800 rounded-xl border border-slate-700">
                    <div id="headlight-icon" class="text-slate-500">☀</div>
                    <span class="text-xs font-semibold uppercase">Toggle Headlights</span>
                </button>
            </section>
        </div>

        <div class="lg:col-span-8 space-y-6">
            <div class="flex gap-2 p-1 bg-slate-900 rounded-xl border border-slate-800">
                <button onclick="switchTab('path')" id="tab-path" class="flex-1 py-2 rounded-lg font-medium text-sm transition-all bg-blue-600 text-white">Path Sketcher</button>
                <button onclick="switchTab('gesture')" id="tab-gesture" class="flex-1 py-2 rounded-lg font-medium text-sm transition-all text-slate-400">Gesture Hub</button>
                <button onclick="switchTab('telemetry')" id="tab-telemetry" class="flex-1 py-2 rounded-lg font-medium text-sm transition-all text-slate-400">Live Logs</button>
            </div>

            <div id="content-path" class="glass-panel rounded-2xl p-6 min-h-[300px] flex items-center justify-center text-slate-500">
                Path Sketcher Canvas Loaded
            </div>
            
            <div id="content-gesture" class="hidden glass-panel rounded-2xl p-6 min-h-[300px] flex items-center justify-center text-slate-500">
                Vision Module Ready
            </div>

            <div id="content-telemetry" class="hidden glass-panel rounded-2xl p-6 min-h-[300px] flex flex-col">
                <div class="flex-1 bg-slate-950 rounded-xl border border-slate-800 p-4 font-mono text-xs overflow-y-auto h-64" id="log-container"></div>
            </div>
        </div>
    </main>

    <footer class="max-w-6xl mx-auto mt-8 flex justify-between text-slate-600 text-xs">
        <span>&copy; 2024 RoboCar Framework</span>
        <span>Latency: <span id="ping-val">--</span></span>
    </footer>

</body>
</html>
